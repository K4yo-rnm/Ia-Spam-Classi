<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectar E-mail</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <aside class="sidebar" id="sidebar"></aside>

        <main class="content">

            <header class="topbar">
                <div>
                    <h1>Conectar seu e-mail</h1>
                    <p>Conecte sua conta para permitir a análise automática das mensagens.</p>
                </div>

                <button class="btn-notificacao">Notificações 3</button>
            </header>

            <section class="form-card">
                <h2>Escolha o provedor de e-mail</h2>

                <div class="provedores">
                    <button type="button" class="provedor-card" id="btn-gmail">
                        <strong>Google</strong>
                        <span>Gmail</span>
                    </button>
                
                    <button type="button" class="provedor-card" id="btn-outlook">
                        <strong>Microsoft</strong>
                        <span>Outlook / Hotmail</span>
                    </button>
                </div>

                <div class="separador">
                    <span>ou</span>
                </div>

                <h2>Conexão via IMAP</h2>
                <p class="texto-ajuda">Conecte qualquer provedor de e-mail utilizando IMAP.</p>

                <form id="form-conectar">
                    <label for="email">Endereço de e-mail</label>
                    <input type="email" id="email" placeholder="exemplo@dominio.com" required>

                    <label for="senha">Senha de aplicativo</label>
                    <input type="password" id="senha" placeholder="Digite sua senha de aplicativo" required>

                    <label for="servidor">Servidor IMAP</label>
                    <input type="text" id="servidor" placeholder="imap.gmail.com" required>

                    <label for="porta">Porta</label>
                    <input type="number" id="porta" value="993" required>

                    <p class="aviso-seguranca">
                        Suas credenciais serão usadas apenas para conectar ao provedor de e-mail.
                    </p>

                    <button type="submit" class="btn-principal">Conectar E-mail</button>
                </form>

                <p id="mensagem-conexao" class="mensagem-retorno"></p>
            </section>

        </main>

    </div>

    <script src="sidbar.js"></script>
    <script>
        carregarSidebar("conectar");
    </script>
    <script src="script.js"></script>
</body>

</html>
